    secret: ForLoveSecretKey2024CoupleOnlyChangeInProduction!!
    expiration-ms: 604800000
  couple:
    username1: you
    password1: love123
    username2: me
    password2: love123
    nickname1: 你
    nickname2: 我
    start-date: 2024-01-01
    meet-places:
      - name: 武汉大学
        lat: 30.5315
        lng: 114.3610
      - name: 湖北大学
        lat: 30.5810
        lng: 114.3290

upload:
  dir: ./uploads
