# ForLove 公网 IP + HTTPS（自签名证书，支持浏览器定位）
# 1. 生成证书: ./generate-self-signed-cert.sh 你的公网IP
# 2. 修改下方 root、ssl_certificate 路径
# 3. nginx -t && nginx -s reload
# 访问: https://你的公网IP/  （首次需信任证书）

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /path/to/ForLove/deploy/certs/forlove.crt;
    ssl_certificate_key /path/to/ForLove/deploy/certs/forlove.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /path/to/ForLove/frontend/dist;
    index index.html;

    client_max_body_size 12m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:6748;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:6748;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://127.0.0.1:6748;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
