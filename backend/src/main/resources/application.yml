server:
  port: 6748

spring:
  datasource:
    url: jdbc:sqlite:./data/forlove.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

forlove:
  jwt:
    secret: ForLoveSecretKey2024CoupleOnlyChangeInProduction!!
    expiration-ms: 604800000
  cors:
    allowed-origin-patterns:
      - "http://localhost"
      - "http://localhost:*"
      - "http://127.0.0.1"
      - "http://127.0.0.1:*"
      - "http://192.168.*"
      - "http://192.168.*:*"
      - "http://10.*"
      - "http://10.*:*"
      - "http://172.*"
      - "http://172.*:*"
      - "http://*"
      - "http://*:*"
      - "https://*"
      - "https://*:*"
  couple:
    username1: ye
    password1: love
    username2: jie
    password2: love
    nickname1: 叶
    nickname2: 杰
    love-quotes:
      - 遇见你，是我这辈子最美的意外。
      - 愿得一心人，白首不相离。
      - 你在的地方，就是我心安之处。
      - 樱花落下的速度是每秒五厘米，而我走向你的速度，是心跳的频率。
      - 武大樱花再美，也不及你笑起来的样子。
      - 想和你一起看遍世间所有的樱花。
      - 我的宇宙里，只有你一颗恒星。
      - 每一天醒来，第一个想到的就是你。
    anniversaries:
      - name: 第一次见面
        date: 2026-05-24
      - name: 在一起
        date: 2026-06-18
    meet-places:
      - name: 武汉大学
        lat: 30.5315
        lng: 114.3610
      - name: 湖北大学
        lat: 30.5810
        lng: 114.3290
  draw-guess:
    max-rounds: 6
    words:
      - 约会
      - 奶茶
      - 纪念日
      - 牵手
